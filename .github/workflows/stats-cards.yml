name: Update README cards

on:
  push: # 推送时立即触发
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
            card: stats
            options: username=${{ github.repository_owner }}&show_icons=true
            path: profile/stats.svg
            token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
            card: top-langs
            options: username=${{ github.repository_owner }}&layout=normal&langs_count=6&exclude_repo=billtsui.github.io&count_private=true
            path: profile/top-langs.svg
            token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate wakatime
        uses: stats-organization/github-readme-stats-action@v2
        with:
            card: wakatime
            options: username=billtsui&layout=normal
            path: profile/wakatime.svg
            token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "billtsui"
          git config user.email "dhubilltsui@gmail.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push